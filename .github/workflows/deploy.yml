name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run tests
        run: npm test --if-present
        continue-on-error: true

      - name: Wait for Railway deployment
        run: |
          echo "Waiting for Railway to deploy the application..."
          sleep 10

      - name: Health check
        id: health-check
        run: |
          # Extract domain from Railway environment
          # For now, use a placeholder - Railway will provide the actual domain
          DOMAIN="${{ secrets.RAILWAY_DOMAIN }}"
          if [ -z "$DOMAIN" ]; then
            echo "Warning: RAILWAY_DOMAIN not set in secrets. Skipping health check."
            echo "status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi

          HEALTH_URL="https://${DOMAIN}/api/health"
          echo "Checking health endpoint: $HEALTH_URL"

          # Retry health check up to 30 times (5 minutes total with 10s interval)
          for i in {1..30}; do
            echo "Attempt $i/30..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Health check passed! Application is running."
              echo "status=success" >> $GITHUB_OUTPUT
              exit 0
            fi

            echo "Health check returned HTTP $HTTP_CODE. Retrying in 10 seconds..."
            sleep 10
          done

          echo "✗ Health check failed after 5 minutes. Application may not have started."
          echo "status=failed" >> $GITHUB_OUTPUT
          exit 1
        continue-on-error: true

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
        run: |
          echo "Deployment to Railway is handled via GitHub integration."
          echo "Railway automatically deploys on push to main branch."
          echo "Monitor deployment: https://railway.app → Projects → YT Multi-Publisher"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✓ Deployment successful!"
            echo "App is live. Check health: /api/health"
          else
            echo "✗ Deployment or tests failed. Review logs above."
          fi

  slack-notification:
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    steps:
      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL }}
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "Deployment Status: ${{ needs.deploy.result }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*YT Multi-Publisher Deployment*\nStatus: ${{ needs.deploy.result }}\nBranch: main\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
        continue-on-error: true
