<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PMP Logo Demo 01 - Editorial Signal Clash</title>
  <style>
    :root {
      --ink: #07182d;
      --paper: #f7efe2;
      --cream: #fff5df;
      --signal: #f33766;
      --coral: #ff9a73;
      --steel: #d8e5f0;
      --shadow: rgba(2, 10, 24, .52);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--cream);
      background:
        radial-gradient(circle at 50% 40%, rgba(255, 245, 223, .16), transparent 24rem),
        radial-gradient(circle at 64% 45%, rgba(243, 55, 102, .22), transparent 19rem),
        linear-gradient(145deg, #06152a, #07182d 54%, #020817);
      font-family: "Aptos", "Segoe UI", sans-serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -10%;
      pointer-events: none;
      opacity: .27;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.92) 0 1px, transparent 1.4px),
        radial-gradient(circle, rgba(0,0,0,.8) 0 1px, transparent 1.5px);
      background-size: 11px 11px, 17px 17px;
      mix-blend-mode: overlay;
      animation: grain 5s steps(6) infinite;
    }

    .stage {
      width: min(1060px, 94vw);
      min-height: min(720px, 92vh);
      display: grid;
      place-items: center;
      position: relative;
      padding: 48px;
    }

    .edition {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-40%);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(12px, 1.4vw, 20px);
      font-style: italic;
      letter-spacing: .12em;
      color: var(--cream);
      opacity: .9;
    }

    .logo-lockup {
      position: relative;
      width: min(680px, 88vw);
      aspect-ratio: 1.16;
      filter: drop-shadow(0 28px 48px var(--shadow));
    }

    .word {
      position: absolute;
      margin: 0;
      line-height: .82;
      letter-spacing: -.08em;
      animation: typeIn .9s cubic-bezier(.18, .9, .16, 1) both;
    }

    .platform {
      left: 70px;
      top: 26px;
      z-index: 3;
      color: var(--signal);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(70px, 13vw, 148px);
      font-style: italic;
      font-weight: 400;
      transform: rotate(-3deg);
    }

    .multi {
      right: 14px;
      top: 88px;
      z-index: 4;
      color: #fff;
      font-family: "Arial Black", Impact, sans-serif;
      font-size: clamp(68px, 13.4vw, 148px);
      font-weight: 900;
      animation-delay: .16s;
    }

    .publisher {
      left: 120px;
      top: 214px;
      z-index: 5;
      color: #fff;
      font-family: "Arial Black", Impact, sans-serif;
      font-size: clamp(66px, 13vw, 142px);
      font-weight: 900;
      animation-delay: .3s;
    }

    .mark-name {
      position: absolute;
      left: 170px;
      top: 326px;
      z-index: 6;
      color: var(--coral);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(68px, 12vw, 132px);
      font-style: italic;
      animation: brush 1.2s .42s cubic-bezier(.16,.8,.18,1) both;
    }

    .signal-fruit {
      position: absolute;
      left: 174px;
      top: 255px;
      width: 330px;
      height: 310px;
      z-index: 2;
      animation: pulse 2.8s ease-in-out infinite;
    }

    .halo {
      position: absolute;
      inset: 44px 28px 12px 12px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.78), rgba(255,255,255,.08) 46%, transparent 72%);
      filter: blur(2px);
    }

    .orb {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 28%, #ff5475 0 22%, transparent 23%),
        radial-gradient(circle at 70% 76%, #64081d 0 18%, transparent 19%),
        #e5224f;
      border: 8px solid #050b18;
      box-shadow: inset -18px -20px 0 rgba(0,0,0,.34);
    }

    .orb.one { left: 48px; top: 88px; }
    .orb.two { left: 172px; top: 90px; }

    .stem {
      position: absolute;
      width: 7px;
      height: 142px;
      border-radius: 999px;
      background: #ff8b6e;
      border-left: 3px solid #050b18;
      transform-origin: bottom;
    }

    .stem.one { left: 104px; top: 8px; transform: rotate(-14deg); }
    .stem.two { left: 228px; top: 2px; transform: rotate(16deg); }

    .wire {
      position: absolute;
      left: 30px;
      bottom: 42px;
      width: 282px;
      height: 34px;
      border-top: 5px solid #050b18;
      transform: rotate(-7deg);
    }

    .wire::before,
    .wire::after {
      content: "";
      position: absolute;
      top: -16px;
      width: 50px;
      height: 32px;
      border-top: 4px solid var(--coral);
      border-bottom: 4px solid var(--coral);
      transform: skewX(-28deg);
    }

    .wire::before { left: 44px; }
    .wire::after { right: 42px; }

    .tagline {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      width: max-content;
      color: var(--steel);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(13px, 1.5vw, 18px);
      letter-spacing: .28em;
      text-transform: uppercase;
      opacity: .9;
    }

    @keyframes typeIn {
      from { opacity: 0; transform: translateY(28px) rotate(-2deg); filter: blur(10px); }
      to { opacity: 1; filter: blur(0); }
    }

    @keyframes brush {
      from { opacity: 0; clip-path: inset(0 100% 0 0); transform: translateX(-24px) rotate(-4deg); }
      to { opacity: 1; clip-path: inset(0 0 0 0); transform: translateX(0) rotate(-2deg); }
    }

    @keyframes pulse {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-5px) scale(1.015); }
    }

    @keyframes grain {
      0% { transform: translate(0,0); }
      20% { transform: translate(-2%,1%); }
      40% { transform: translate(1%,-1%); }
      60% { transform: translate(2%,2%); }
      80% { transform: translate(-1%,2%); }
      100% { transform: translate(0,0); }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="PMP editorial animated logo demo">
    <div class="edition">LIMITED SYSTEM // LOGO DIRECTION 01</div>
    <section class="logo-lockup">
      <div class="signal-fruit" aria-hidden="true">
        <div class="halo"></div>
        <div class="stem one"></div>
        <div class="stem two"></div>
        <div class="orb one"></div>
        <div class="orb two"></div>
        <div class="wire"></div>
      </div>
      <h1 class="word platform">Platform</h1>
      <h2 class="word multi">Multi</h2>
      <h2 class="word publisher">Publisher</h2>
      <div class="mark-name">PMP</div>
    </section>
    <div class="tagline">Publish sharp, stay in control.</div>
  </main>
</body>
</html>
