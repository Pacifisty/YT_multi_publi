<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PMP Logo Demo 03 - Motion Stack</title>
  <style>
    :root {
      --black: #050505;
      --cream: #fff0c7;
      --yellow: #ffbf00;
      --violet: #a777ff;
      --cyan: #61d5ff;
      --orange: #ff5b00;
      --pink: #f32d84;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 45%, rgba(167,119,255,.2), transparent 20rem),
        radial-gradient(circle at 36% 62%, rgba(255,91,0,.18), transparent 18rem),
        var(--black);
      color: var(--cream);
      font-family: "Arial Black", Impact, sans-serif;
      overflow: hidden;
    }

    .poster {
      width: min(900px, 94vw);
      min-height: min(820px, 96vh);
      display: grid;
      place-items: center;
      position: relative;
      perspective: 1000px;
      padding: 48px;
    }

    .stack {
      position: relative;
      width: min(620px, 90vw);
      height: 620px;
      transform: rotateX(6deg) rotateZ(-3deg);
      animation: stageFloat 5s ease-in-out infinite;
    }

    .row {
      position: absolute;
      left: 50%;
      display: flex;
      gap: 14px;
      transform: translateX(-50%);
      filter: drop-shadow(18px 22px 0 rgba(0,0,0,.55));
    }

    .row.one { top: 36px; }
    .row.two { top: 214px; }
    .row.three { top: 392px; }

    .letter {
      position: relative;
      display: grid;
      place-items: center;
      width: clamp(120px, 20vw, 170px);
      height: clamp(136px, 22vw, 184px);
      color: var(--cream);
      font-size: clamp(96px, 16vw, 148px);
      line-height: 1;
      font-weight: 950;
      letter-spacing: -.12em;
      background: var(--cream);
      color: #111;
      border: 4px solid #111;
      transform: skewY(-5deg);
      animation: pop 2.4s cubic-bezier(.2,.8,.2,1) infinite;
    }

    .letter::before {
      content: "";
      position: absolute;
      inset: -4px -22px 18px auto;
      width: 22px;
      background: var(--yellow);
      border: 4px solid #111;
      border-left: 0;
      transform: skewY(42deg);
      transform-origin: left bottom;
      z-index: -1;
    }

    .letter::after {
      content: "";
      position: absolute;
      left: 14px;
      right: -22px;
      bottom: -24px;
      height: 24px;
      background: #232323;
      border: 4px solid #111;
      border-top: 0;
      transform: skewX(48deg);
      z-index: -1;
    }

    .letter.alt::before { background: var(--orange); }
    .letter:nth-child(2) { animation-delay: .16s; }
    .letter:nth-child(3) { animation-delay: .32s; }

    .cable {
      position: absolute;
      width: 140px;
      height: 86px;
      border: 13px solid var(--violet);
      border-left: 0;
      border-bottom: 0;
      border-radius: 0 60px 0 0;
      filter: drop-shadow(0 0 0 #111);
      animation: cableFlow 2s ease-in-out infinite;
    }

    .cable.a { left: 144px; top: 170px; transform: rotate(38deg); }
    .cable.b { right: 142px; top: 344px; transform: rotate(218deg); animation-delay: .3s; }
    .cable.c { left: 206px; bottom: 44px; transform: rotate(108deg); animation-delay: .6s; }

    .dot-grid {
      position: absolute;
      inset: auto 50% 30px auto;
      transform: translateX(50%);
      display: grid;
      grid-template-columns: repeat(20, 5px);
      gap: 5px;
      opacity: .82;
    }

    .dot-grid span {
      width: 5px;
      height: 5px;
      border-radius: 999px;
      background: var(--cyan);
      animation: scan 1.8s linear infinite;
      animation-delay: calc(var(--i) * -28ms);
    }

    .caption {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      font-family: "Aptos", "Segoe UI", sans-serif;
      color: rgba(255,240,199,.72);
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .24em;
      text-transform: uppercase;
    }

    .badge {
      position: absolute;
      top: 52px;
      right: 80px;
      width: 92px;
      height: 92px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 3px solid var(--cyan);
      color: var(--cyan);
      font-size: 13px;
      line-height: 1.1;
      text-align: center;
      transform: rotate(8deg);
      animation: blink 1.6s steps(2) infinite;
    }

    @keyframes pop {
      0%, 100% { transform: translateZ(0) skewY(-5deg); }
      50% { transform: translateZ(48px) translateY(-8px) skewY(-5deg); }
    }

    @keyframes cableFlow {
      0%, 100% { border-color: var(--violet); filter: brightness(1); }
      50% { border-color: var(--cyan); filter: brightness(1.25); }
    }

    @keyframes stageFloat {
      0%, 100% { transform: rotateX(6deg) rotateZ(-3deg) translateY(0); }
      50% { transform: rotateX(4deg) rotateZ(1deg) translateY(-12px); }
    }

    @keyframes scan {
      0% { opacity: .15; transform: scale(.7); }
      45% { opacity: 1; transform: scale(1.25); }
      100% { opacity: .15; transform: scale(.7); }
    }

    @keyframes blink {
      0%, 100% { opacity: .52; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="poster" aria-label="PMP motion stack animated logo demo">
    <div class="badge">60fps<br>ready</div>
    <section class="stack">
      <div class="row one">
        <div class="letter">P</div>
        <div class="letter alt">L</div>
        <div class="letter">A</div>
      </div>
      <div class="row two">
        <div class="letter alt">M</div>
        <div class="letter">U</div>
        <div class="letter alt">L</div>
      </div>
      <div class="row three">
        <div class="letter">P</div>
        <div class="letter alt">M</div>
        <div class="letter">P</div>
      </div>
      <div class="cable a"></div>
      <div class="cable b"></div>
      <div class="cable c"></div>
    </section>
    <div class="dot-grid" aria-hidden="true">
      <span style="--i:1"></span><span style="--i:2"></span><span style="--i:3"></span><span style="--i:4"></span><span style="--i:5"></span>
      <span style="--i:6"></span><span style="--i:7"></span><span style="--i:8"></span><span style="--i:9"></span><span style="--i:10"></span>
      <span style="--i:11"></span><span style="--i:12"></span><span style="--i:13"></span><span style="--i:14"></span><span style="--i:15"></span>
      <span style="--i:16"></span><span style="--i:17"></span><span style="--i:18"></span><span style="--i:19"></span><span style="--i:20"></span>
      <span style="--i:21"></span><span style="--i:22"></span><span style="--i:23"></span><span style="--i:24"></span><span style="--i:25"></span>
      <span style="--i:26"></span><span style="--i:27"></span><span style="--i:28"></span><span style="--i:29"></span><span style="--i:30"></span>
      <span style="--i:31"></span><span style="--i:32"></span><span style="--i:33"></span><span style="--i:34"></span><span style="--i:35"></span>
      <span style="--i:36"></span><span style="--i:37"></span><span style="--i:38"></span><span style="--i:39"></span><span style="--i:40"></span>
    </div>
    <div class="caption">Direction 03 / motion identity for growth + video surfaces</div>
  </main>
</body>
</html>
