<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PMP Animated Logo 04 - Psychedelic Publishing Signal</title>
  <style>
    :root {
      --ink: #20121b;
      --cream: #fff1c9;
      --yellow: #ffe000;
      --orange: #ff5f00;
      --pink: #ff3da7;
      --blue: #27b9ff;
      --green: #5bd969;
      --violet: #8363ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--ink);
      background:
        radial-gradient(circle at 50% 28%, rgba(255,255,255,.58), transparent 13rem),
        linear-gradient(135deg, #ffe400, #ff6a00 52%, #eb198f);
      font-family: "Cooper Black", "Bookman Old Style", Georgia, serif;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -12%;
      opacity: .17;
      pointer-events: none;
      background-image:
        radial-gradient(circle, rgba(32,18,27,.78) 0 1px, transparent 1.6px),
        repeating-linear-gradient(45deg, transparent 0 18px, rgba(255,255,255,.28) 18px 20px);
      background-size: 16px 16px, auto;
      mix-blend-mode: multiply;
      animation: paperDrift 7s steps(5) infinite;
    }

    .assumptions {
      position: fixed;
      left: 22px;
      bottom: 18px;
      max-width: 320px;
      padding: 12px 14px;
      border: 2px solid rgba(32,18,27,.24);
      border-radius: 18px;
      background: rgba(255,241,201,.72);
      font: 700 11px/1.45 "Aptos", sans-serif;
      letter-spacing: .02em;
      backdrop-filter: blur(10px);
    }

    .poster {
      width: min(980px, 94vw);
      min-height: min(760px, 92vh);
      display: grid;
      place-items: center;
      position: relative;
      padding: 44px;
    }

    .frame {
      position: relative;
      width: min(780px, 90vw);
      aspect-ratio: 1.22;
      border: 8px solid var(--ink);
      border-radius: 44px;
      background:
        radial-gradient(circle at 50% 52%, rgba(255,255,255,.38), transparent 9rem),
        repeating-radial-gradient(circle at 50% 52%, rgba(131,99,255,.24) 0 11px, rgba(91,217,105,.22) 11px 23px),
        linear-gradient(180deg, #4ad5ff, #f577e4 60%, #2f1944);
      box-shadow:
        0 0 0 9px var(--blue),
        0 0 0 17px var(--green),
        0 32px 0 rgba(32,18,27,.35);
      overflow: hidden;
      animation: frameBreathe 4.8s ease-in-out infinite;
    }

    .sun {
      position: absolute;
      left: 50%;
      top: 45%;
      width: 210px;
      height: 210px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--yellow), var(--orange), var(--pink), var(--blue), var(--yellow));
      border: 5px solid var(--ink);
      animation: spin 12s linear infinite;
    }

    .sun::after {
      content: "PMP";
      position: absolute;
      inset: 26px;
      display: grid;
      place-items: center;
      border: 4px solid var(--ink);
      border-radius: 50%;
      background: var(--cream);
      font-size: clamp(46px, 8vw, 84px);
      letter-spacing: -.16em;
      padding-right: .13em;
      text-shadow: 4px 4px 0 var(--pink);
      animation: pulseLetters 1.9s ease-in-out infinite;
    }

    .arc {
      position: absolute;
      left: 50%;
      top: 28px;
      width: 92%;
      transform: translateX(-50%);
      text-align: center;
      font-size: clamp(40px, 8vw, 94px);
      line-height: .82;
      letter-spacing: -.07em;
      color: var(--yellow);
      -webkit-text-stroke: 3px var(--ink);
      text-shadow: 7px 8px 0 var(--pink), 13px 15px 0 rgba(32,18,27,.55);
      animation: arcWave 3.6s ease-in-out infinite;
    }

    .rays {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(66deg, transparent 0 43%, rgba(255,224,0,.78) 43% 47%, transparent 47%),
        linear-gradient(115deg, transparent 0 47%, rgba(255,224,0,.74) 47% 51%, transparent 51%),
        linear-gradient(247deg, transparent 0 48%, rgba(39,185,255,.7) 48% 52%, transparent 52%);
      animation: rayShift 5.5s ease-in-out infinite;
    }

    .cloud {
      position: absolute;
      width: 116px;
      height: 30px;
      border: 3px solid var(--ink);
      border-radius: 999px;
      background: var(--cream);
      box-shadow: 0 12px 0 rgba(32,18,27,.18);
      animation: cloudFloat 8s ease-in-out infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      bottom: 8px;
      width: 44px;
      height: 44px;
      border: 3px solid var(--ink);
      border-radius: 50%;
      background: var(--cream);
      border-bottom-color: transparent;
    }

    .cloud::before { left: 17px; }
    .cloud::after { right: 20px; }
    .cloud.one { left: 58px; top: 245px; }
    .cloud.two { right: 72px; top: 285px; animation-delay: -2.2s; }
    .cloud.three { left: 300px; bottom: 118px; transform: scale(.74); animation-delay: -4s; }

    .caption {
      position: absolute;
      left: 50%;
      bottom: 62px;
      transform: translateX(-50%);
      width: max-content;
      padding: 14px 26px 12px;
      border: 4px solid var(--ink);
      border-radius: 999px;
      background: var(--cream);
      font: 950 clamp(16px, 2.2vw, 28px)/1 "Arial Black", Impact, sans-serif;
      letter-spacing: .04em;
      text-transform: uppercase;
      box-shadow: 0 10px 0 var(--ink);
    }

    @keyframes frameBreathe {
      0%, 100% { transform: rotate(-.7deg) scale(1); }
      50% { transform: rotate(.7deg) scale(1.012); }
    }

    @keyframes spin {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes pulseLetters {
      0%, 100% { transform: scale(1); }
      45% { transform: scale(1.05) rotate(-1.5deg); }
    }

    @keyframes arcWave {
      0%, 100% { transform: translateX(-50%) rotate(-1deg); }
      50% { transform: translateX(-50%) rotate(1deg) translateY(4px); }
    }

    @keyframes rayShift {
      50% { filter: hue-rotate(24deg) saturate(1.2); transform: scale(1.025); }
    }

    @keyframes cloudFloat {
      0%, 100% { translate: 0 0; }
      50% { translate: 22px -8px; }
    }

    @keyframes paperDrift {
      50% { transform: translate3d(-12px, 8px, 0); }
    }
  </style>
</head>
<body>
  <main class="poster" aria-label="Animated PMP logo direction, psychedelic publishing signal">
    <section class="frame">
      <div class="rays"></div>
      <div class="arc">Publish louder</div>
      <div class="sun"></div>
      <div class="cloud one"></div>
      <div class="cloud two"></div>
      <div class="cloud three"></div>
      <div class="caption">Platform Multi Publisher</div>
    </section>
  </main>
  <aside class="assumptions">
    Assumptions: loud creator-facing logo intro, useful for social videos and campaign openings. Placeholder: final lettering would be custom drawn, not a font stack.
  </aside>
</body>
</html>
