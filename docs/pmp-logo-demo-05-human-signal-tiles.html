<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PMP Animated Logo 05 - Human Signal Tiles</title>
  <style>
    :root {
      --ink: #211d1d;
      --paper: #f8ead4;
      --blue: #4284ad;
      --blue-2: #265a7f;
      --line: rgba(248,234,212,.18);
      --quiet: rgba(248,234,212,.72);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--paper);
      background:
        radial-gradient(circle at 50% 40%, rgba(66,132,173,.2), transparent 20rem),
        #211d1d;
      font-family: "Optima", "Avenir Next", "Trebuchet MS", sans-serif;
      overflow: hidden;
    }

    .stage {
      width: min(1050px, 94vw);
      min-height: min(720px, 94vh);
      display: grid;
      place-items: center;
      gap: 40px;
      position: relative;
      padding: 48px;
    }

    .assumptions {
      position: absolute;
      left: 42px;
      bottom: 34px;
      max-width: 360px;
      color: var(--quiet);
      font-size: 12px;
      line-height: 1.5;
      letter-spacing: .04em;
    }

    .tile-row {
      display: flex;
      gap: clamp(22px, 4vw, 54px);
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 32px 38px rgba(0,0,0,.28));
      animation: rowSettle 5.6s ease-in-out infinite;
    }

    .tile {
      position: relative;
      width: clamp(142px, 17vw, 210px);
      aspect-ratio: 1.2;
      border-radius: 28px;
      background: var(--paper);
      overflow: hidden;
      animation: tilePulse 4.8s ease-in-out infinite;
    }

    .tile:nth-child(2) { animation-delay: -.45s; }
    .tile:nth-child(3) { animation-delay: -.9s; }

    .tile::after {
      content: "";
      position: absolute;
      inset: 17px;
      border-radius: 20px;
      border: 1px solid rgba(33,29,29,.1);
      pointer-events: none;
    }

    .face {
      position: absolute;
      inset: 0;
    }

    .face::before,
    .face::after {
      content: "";
      position: absolute;
      top: 30px;
      bottom: 28px;
      width: 48%;
      background: var(--blue);
    }

    .face::before {
      left: 23px;
      border-radius: 58% 44% 42% 58% / 48% 38% 58% 52%;
      clip-path: polygon(0 0, 80% 0, 96% 28%, 69% 48%, 94% 78%, 76% 100%, 0 100%);
    }

    .face::after {
      right: 21px;
      border-radius: 44% 58% 58% 42% / 38% 48% 52% 58%;
      background: var(--ink);
      clip-path: polygon(20% 0, 100% 0, 100% 100%, 24% 100%, 6% 78%, 31% 48%, 4% 28%);
    }

    .tile.signal .face::before {
      background:
        radial-gradient(circle at 64% 20%, transparent 0 11px, var(--blue) 12px),
        repeating-radial-gradient(circle at 30% 35%, var(--blue) 0 3px, transparent 3px 10px);
    }

    .tile.publish .face::before {
      clip-path: polygon(0 0, 100% 50%, 0 100%);
      border-radius: 20px;
      left: 44px;
      width: 45%;
      top: 44px;
      bottom: 44px;
    }

    .tile.publish .face::after {
      right: 42px;
      width: 33%;
      background: var(--blue-2);
      clip-path: none;
      border-radius: 999px;
      opacity: .92;
    }

    .eye {
      position: absolute;
      width: 13px;
      height: 13px;
      top: 58px;
      border-radius: 50%;
      background: var(--paper);
      z-index: 2;
      animation: blink 4.4s steps(1) infinite;
    }

    .eye.left { left: 80px; }
    .eye.right { right: 80px; }

    .label {
      position: absolute;
      left: 0;
      right: 0;
      bottom: -60px;
      text-align: center;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(13px, 1.7vw, 21px);
      letter-spacing: .42em;
      text-transform: uppercase;
      color: var(--paper);
      opacity: .86;
    }

    .wordmark {
      display: grid;
      gap: 10px;
      text-align: center;
      transform: translateY(34px);
    }

    .wordmark strong {
      font: 800 clamp(58px, 8vw, 108px)/.88 "Optima", "Avenir Next", sans-serif;
      letter-spacing: .02em;
    }

    .wordmark span {
      color: var(--quiet);
      font-size: 13px;
      letter-spacing: .34em;
      text-transform: uppercase;
    }

    .signal-line {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(720px, 80vw);
      height: 1px;
      transform: translate(-50%, -50%);
      background: linear-gradient(90deg, transparent, var(--line), transparent);
      animation: scan 3.2s ease-in-out infinite;
    }

    @keyframes rowSettle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes tilePulse {
      0%, 100% { transform: scale(1); }
      45% { transform: scale(1.028); }
    }

    @keyframes blink {
      0%, 88%, 100% { transform: scaleY(1); }
      92% { transform: scaleY(.12); }
    }

    @keyframes scan {
      0%, 100% { opacity: .15; transform: translate(-50%, -50%) scaleX(.8); }
      50% { opacity: 1; transform: translate(-50%, -50%) scaleX(1.1); }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="Animated PMP logo direction, human signal tiles">
    <div class="signal-line"></div>
    <section class="tile-row">
      <article class="tile signal">
        <div class="face"></div>
        <i class="eye left"></i>
        <span class="label">See</span>
      </article>
      <article class="tile publish">
        <div class="face"></div>
        <i class="eye left"></i>
        <i class="eye right"></i>
        <span class="label">Publish</span>
      </article>
      <article class="tile listen">
        <div class="face"></div>
        <i class="eye right"></i>
        <span class="label">Learn</span>
      </article>
    </section>
    <section class="wordmark">
      <strong>PMP</strong>
      <span>Platform Multi Publisher</span>
    </section>
    <aside class="assumptions">
      Assumptions: calmer production logo, app icon friendly, works in small UI sizes. Placeholder: face geometry would be refined into a proper SVG symbol set.
    </aside>
  </main>
</body>
</html>
